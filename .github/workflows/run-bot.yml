name: Weekly Binance Scan

on:
  schedule:
    - cron: "0 7 * * 6"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests

      - run: python buy-sell.py
        env:
          EMAILUSER: ${{ secrets.EMAILUSER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
